[profile.default]
src         = "contracts"
test        = "test/forge"
out         = "out"
libs        = ["node_modules", "lib"]
cache_path  = "cache_forge"
solc        = "0.8.28"
optimizer   = true
optimizer_runs = 200
evm_version = "cancun"
via_ir      = false

# Filter out hardhat-only suites so `forge test` ignores them.
no_match_path = "test/v2/**/*.spec.ts"

[fuzz]
runs        = 10000
max_test_rejects = 1_000_000
seed        = "0x1337"

[invariant]
runs           = 256
depth          = 32
fail_on_revert = false
